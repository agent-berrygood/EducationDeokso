# ============================================================
# Mutations
# ============================================================

# 신청서 생성 (부모 + 자녀들 한번에)
mutation CreateApplication(
  $parentName: String!
  $parentPhone: String!
  $depositorName: String!
  $grandTotal: Float!
) @auth(level: PUBLIC) {
  application_insert(data: {
    parentName: $parentName
    parentPhone: $parentPhone
    depositorName: $depositorName
    grandTotal: $grandTotal
  }) {
    id
    parentName
    parentPhone
    depositorName
    grandTotal
    createdAt
  }
}

# 자녀 정보 추가 (신청서 생성 후 호출)
